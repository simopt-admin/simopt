[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["simopt", "simopt.models", "simopt.solvers"]

[project]
name = "simoptlib"
version = "1.0.2"
authors = [
  { name="David Eckman", email="eckman@tamu.edu" },
  { name="Shane Henderson", email="sgh9@cornell.edu" },
  { name="Sara Shashaani", email="sshasha2@ncsu.edu" },
]
description = "A testbed for simulation-optimization experiments."
readme = "README.md"
license = { file="LICENSE" }
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
  "numpy >= 1.24.0",
  "scipy >= 1.7.3",
  "matplotlib >= 3.2.2",
  "pandas >= 1.3.5",
  "seaborn >= 0.11.2",
  "mrg32k3a >= 1.0.0"
]

[project.urls]
"Homepage" = "https://github.com/simopt-admin/simopt"
"Documentation" = "https://simopt.readthedocs.io/en/latest/"

[tool.ruff]
# Set the maximum line length to 80 characters.
line-length = 80
indent-width = 4

# Assume Python 3.11 syntax.
target-version = "py311"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "B", "N", "D", "UP", "ANN0", "ANN2", "ANN4", "ASYNC", "S", "A", "RUF", "NPY201"]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"
