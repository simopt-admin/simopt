[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["simopt", "simopt.gui", "simopt.models", "simopt.solvers"]

[project]
name = "simoptlib"
version = "1.2.0"
authors = [
  { name = "David Eckman", email = "eckman@tamu.edu" },
  { name = "Shane Henderson", email = "sgh9@cornell.edu" },
  { name = "Sara Shashaani", email = "sshasha2@ncsu.edu" },
  { name = "William Grochocinski", email = "wagrocho@ncsu.edu" },
]
description = "A testbed for simulation-optimization experiments."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11,<3.14"
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
]
dependencies = [
  "boltons>=0.6.3",
  "cvxpy>=1.6.0",
  "joblib>=1.0.0",
  "matplotlib>=3.9.0",
  "mrg32k3a[rust]>=2.0.0",
  "numpy>=2.0.0",
  "pandas>=2.2.2",
  "pydantic>=2.2.0",
  "scipy>=1.13.0",
  "seaborn>=0.13.0",
]


[dependency-groups]
all = [
  { include-group = "build" },
  { include-group = "dev" },
  { include-group = "docs" },
  { include-group = "notebooks" },
  { include-group = "testing" },
]
build = ["setuptools>=77.0.3", "build"]
dev = ["ruff>=0.14.0", "jupytext"]
docs = ["sphinx>=8.0.0", "sphinx-autoapi>=3.6.0", "sphinx-rtd-theme>=3.0.0"]
notebooks = ["ipykernel"]
testing = ["pyyaml"]

[project.urls]
"Homepage" = "https://github.com/simopt-admin/simopt"
"Documentation" = "https://simopt.readthedocs.io/en/latest/"
